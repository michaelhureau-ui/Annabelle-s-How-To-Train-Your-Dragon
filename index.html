<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Dragon World — Isle of Berk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{overflow:hidden;background:#000;width:100vw;height:100vh;font-family:'Crimson Text',Georgia,serif;}
canvas{display:block;}

/* Screens */
.screen{display:none;position:fixed;inset:0;}
.screen.active{display:block;}

/* Title screen */
#s-title{
background:radial-gradient(ellipse at 50% 100%,#1a3a0a,#050f02 60%,#000);
overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:14px 12px 90px;
}
#s-title h1{font-family:‘Cinzel’,serif;font-size:clamp(1.5em,6vw,2.8em);color:#ffd700;
text-shadow:0 0 25px #ff6a00,0 0 55px #ff2200;margin-bottom:3px;text-align:center;}
.sub{color:#aad4ff;margin-bottom:16px;text-align:center;}
.sh{font-family:‘Cinzel’,serif;color:#ffd700;font-size:.95em;margin:12px 0 7px;text-align:center;letter-spacing:1px;}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:7px;max-width:620px;width:100%;margin-bottom:4px;}
.dcard{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:9px 5px;text-align:center;cursor:pointer;transition:all .22s;}
.dcard:hover,.dcard.sel{border-color:#ffd700;background:rgba(255,215,0,.12);transform:scale(1.04);}
.dcard canvas{display:block;margin:0 auto 3px;}
.dn{font-family:‘Cinzel’,serif;color:#ffd700;font-size:.74em;font-weight:700;}
.dt{font-size:.64em;color:#aad4ff;}
/* Alpha class card */
.dcard.alpha{border-color:#8b0000;background:rgba(139,0,0,.15);}
.dcard.alpha.locked{opacity:.6;cursor:not-allowed;}
.lock-badge{background:#8b0000;color:#ffd700;font-size:.6em;font-family:‘Cinzel’,serif;padding:2px 6px;border-radius:10px;margin-top:3px;display:inline-block;}

/* Viking creator */
.vcbox{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.2);border-radius:14px;padding:13px;max-width:480px;width:100%;margin:0 auto;}
.vcbox canvas{display:block;margin:0 auto 9px;}
.vrow{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.vlbl{color:#ffd700;font-family:‘Cinzel’,serif;font-size:.75em;width:58px;flex-shrink:0;}
.vopts{display:flex;gap:5px;flex-wrap:wrap;}
.vopt{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;font-size:.8em;}
.vopt:hover,.vopt.sel{border-color:#fff;transform:scale(1.22);}
.vtxt{background:rgba(0,0,0,.4);border:1px solid rgba(255,215,0,.3);border-radius:7px;padding:5px 8px;color:#fff;font-size:.88em;width:130px;}
.startbtn{display:block;margin:13px auto 0;padding:12px 32px;border-radius:13px;border:none;background:linear-gradient(135deg,#ffd700,#ff6a00);color:#1a0800;font-family:‘Cinzel’,serif;font-size:.95em;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(255,140,0,.45);transition:all .2s;}
.startbtn:hover{transform:scale(1.05);}

/* World canvas */
#s-world{background:#000;}
#wc{width:100%;height:100%;}

/* HUD */
#hud{position:fixed;top:8px;left:8px;right:8px;z-index:40;display:flex;justify-content:space-between;pointer-events:none;}
.hbox{background:rgba(0,0,0,.72);border:1px solid rgba(255,215,0,.3);border-radius:10px;padding:6px 9px;pointer-events:all;}
.hname{font-family:‘Cinzel’,serif;color:#ffd700;font-size:.76em;margin-bottom:2px;}
.hrow{display:flex;align-items:center;gap:4px;margin-top:2px;}
.hl{font-size:.62em;color:#aad4ff;width:46px;}
.hbar{width:62px;height:7px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;}
.hfill{height:100%;border-radius:4px;transition:width .5s;}
.ff{background:linear-gradient(90deg,#ff6b35,#ffd700);}
.fw{background:linear-gradient(90deg,#4fc3f7,#0288d1);}
.fh{background:linear-gradient(90deg,#f06292,#e91e63);}
.fc{background:linear-gradient(90deg,#ffd700,#ff8c00);}
#cnum{font-size:.62em;color:#ffd700;margin-left:3px;}

/* Mode badge */
#mbadge{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(255,215,0,.4);border-radius:18px;padding:5px 15px;font-family:‘Cinzel’,serif;font-size:.8em;color:#ffd700;z-index:40;pointer-events:none;}

/* Controls */
#ctrl{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;align-items:flex-end;padding:9px 11px 13px;pointer-events:none;}
#dpad{display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(3,40px);gap:3px;pointer-events:all;}
.dp{background:rgba(0,0,0,.75);border:1.5px solid rgba(255,255,255,.22);border-radius:8px;font-size:1em;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;}
.dp:active,.dp.pr{background:rgba(255,215,0,.3);border-color:#ffd700;}
#mbtns{display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:all;}
.mbtn{padding:8px 14px;border-radius:10px;border:2px solid rgba(255,255,255,.22);font-family:‘Cinzel’,serif;font-size:.74em;font-weight:700;cursor:pointer;color:#fff;min-width:78px;transition:all .18s;}
.mbtn.am{border-color:#ffd700;transform:scale(1.06);}
#mw{background:linear-gradient(135deg,#27ae60,#1e8449);}
#mr{background:linear-gradient(135deg,#e67e22,#d35400);}
#mf{background:linear-gradient(135deg,#2980b9,#1a5276);}

/* Action bar */
#abar{position:fixed;bottom:138px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:96vw;}
.ab{padding:7px 10px;border-radius:9px;border:none;font-family:‘Cinzel’,serif;font-size:.65em;font-weight:700;cursor:pointer;color:#fff;white-space:nowrap;}
.af{background:linear-gradient(135deg,#e67e22,#d35400);}
.aw{background:linear-gradient(135deg,#2980b9,#1a5276);}
.aa{background:linear-gradient(135deg,#8e44ad,#6c3483);}
.at{background:linear-gradient(135deg,#c0392b,#922b21);}
.ash{background:linear-gradient(135deg,#d4ac0d,#a07800);}
.ag{background:linear-gradient(135deg,#16a085,#0e6655);}
.asl{background:linear-gradient(135deg,#2c3e50,#1a252f);}
.ahw{background:linear-gradient(135deg,#6a0dad,#3a0066);}
.arsc{background:linear-gradient(135deg,#c0392b,#7b241c);}
.ahatch{background:linear-gradient(135deg,#1abc9c,#0e8a6e);}

/* Flash */
.flash{position:fixed;top:40%;left:50%;transform:translateX(-50%);font-family:‘Cinzel’,serif;font-size:1.2em;color:#ffd700;font-weight:700;z-index:999;pointer-events:none;animation:fup 1.1s ease forwards;}
@keyframes fup{0%{opacity:1;top:40%}100%{opacity:0;top:24%}}

/* Popup */
#pop{position:fixed;inset:0;background:rgba(0,0,0,.83);z-index:200;display:none;align-items:center;justify-content:center;padding:13px;}
#pop.open{display:flex;}
.pb{background:linear-gradient(135deg,#100c00,#090600);border:2px solid rgba(255,215,0,.4);border-radius:16px;padding:18px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;text-align:center;box-shadow:0 0 35px rgba(255,140,0,.18);}
.pt{font-family:‘Cinzel’,serif;font-size:1.05em;color:#ffd700;margin-bottom:9px;}
.ptxt{line-height:1.7;color:#e0d0b0;font-size:.9em;margin-bottom:7px;}
.ow{color:#2ecc71;font-weight:700;margin-top:7px;}.ol{color:#e74c3c;font-weight:700;margin-top:7px;}
.cbtn{padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0800;font-family:‘Cinzel’,serif;font-weight:700;cursor:pointer;margin-top:9px;}
.gbtn{padding:8px 12px;border-radius:11px;border:1.5px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);color:#ffd700;font-family:‘Cinzel’,serif;font-size:.78em;cursor:pointer;margin:3px;}
.gbtn:hover{background:rgba(255,215,0,.18);}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:7px;margin:7px 0;}
.si{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,215,0,.25);border-radius:11px;padding:9px;text-align:center;cursor:pointer;transition:all .18s;}
.si:hover{border-color:#ffd700;background:rgba(255,215,0,.1);}
.si.own{border-color:#2ecc71;background:rgba(46,204,113,.09);cursor:default;}
.sie{font-size:1.6em;margin-bottom:2px;}.sin{font-family:‘Cinzel’,serif;color:#ffd700;font-size:.72em;font-weight:700;}.sip{color:#aad4ff;font-size:.67em;margin-top:2px;}
.arena-btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:9px 0;}
.abtn2{padding:9px 12px;border-radius:11px;border:1.5px solid rgba(255,215,0,.28);background:rgba(255,215,0,.07);color:#ffd700;font-family:‘Cinzel’,serif;font-size:.78em;cursor:pointer;transition:all .18s;}
.abtn2:hover{background:rgba(255,215,0,.18);transform:scale(1.04);}
.hprow{display:flex;gap:9px;justify-content:center;margin:7px 0;}
.hpbox{flex:1;max-width:135px;}.hplbl{font-family:‘Cinzel’,serif;font-size:.68em;color:#ffd700;margin-bottom:2px;}
.hpbar{height:13px;background:rgba(255,255,255,.14);border-radius:7px;overflow:hidden;}
.hpfill{height:100%;border-radius:7px;background:linear-gradient(90deg,#e74c3c,#ff6b35);transition:width .4s;}
.efac{font-size:2.8em;margin:7px 0;}
/* Egg grid */
.eggrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:9px 0;}
.egg{width:55px;height:70px;border-radius:50% 50% 45% 45%;border:2px solid rgba(255,215,0,.3);display:flex;align-items:center;justify-content:center;font-size:1.7em;cursor:pointer;transition:all .2s;position:relative;}
.egg:hover{transform:scale(1.12);}
.egg.hatching{animation:wiggle .3s ease infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
/* Skrill lightning */
.ltng{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:190;opacity:0;transition:opacity .1s;}
.ltng.flash{opacity:1;}
</style>

</head>
<body>

<!-- TITLE -->

<div id="s-title" class="screen active">
  <h1>🐉 Dragon World</h1>
  <p class="sub">Isle of Berk — How to Train Your Dragon</p>

  <p class="sh">⚔️ Choose Your Dragon</p>
  <div class="dgrid" id="dgrid"></div>

  <p class="sh">🪖 Create Your Viking</p>
  <div class="vcbox">
    <canvas id="vcanv" width="80" height="105"></canvas>
    <div class="vrow"><span class="vlbl">Name:</span><input class="vtxt" id="vname" type="text" placeholder="Your Viking name..."></div>
    <div class="vrow"><span class="vlbl">Skin:</span>
      <div class="vopts" id="sk-opts">
        <div class="vopt sel" style="background:#f5c5a3" onclick="sv('skin','#f5c5a3',this)"></div>
        <div class="vopt" style="background:#c68642" onclick="sv('skin','#c68642',this)"></div>
        <div class="vopt" style="background:#8d5524" onclick="sv('skin','#8d5524',this)"></div>
        <div class="vopt" style="background:#fde8c8" onclick="sv('skin','#fde8c8',this)"></div>
      </div>
    </div>
    <div class="vrow"><span class="vlbl">Hair:</span>
      <div class="vopts" id="ha-opts">
        <div class="vopt sel" style="background:#3d2b1f" onclick="sv('hair','#3d2b1f',this)"></div>
        <div class="vopt" style="background:#c8a045" onclick="sv('hair','#c8a045',this)"></div>
        <div class="vopt" style="background:#8b0000" onclick="sv('hair','#8b0000',this)"></div>
        <div class="vopt" style="background:#aaa" onclick="sv('hair','#aaa',this)"></div>
      </div>
    </div>
    <div class="vrow"><span class="vlbl">Tunic:</span>
      <div class="vopts" id="tu-opts">
        <div class="vopt sel" style="background:#4a6741" onclick="sv('tunic','#4a6741',this)"></div>
        <div class="vopt" style="background:#7a4530" onclick="sv('tunic','#7a4530',this)"></div>
        <div class="vopt" style="background:#2a4a7a" onclick="sv('tunic','#2a4a7a',this)"></div>
        <div class="vopt" style="background:#2a2a2a" onclick="sv('tunic','#2a2a2a',this)"></div>
      </div>
    </div>
    <div class="vrow"><span class="vlbl">Helm:</span>
      <div class="vopts" id="he-opts">
        <div class="vopt sel" style="background:#888" onclick="sv('helm','iron',this)">🪖</div>
        <div class="vopt" style="background:#c8a000" onclick="sv('helm','gold',this)">👑</div>
        <div class="vopt" style="background:#555" onclick="sv('helm','horn',this)">🐂</div>
        <div class="vopt" style="background:transparent;border-color:#555" onclick="sv('helm','none',this)">✗</div>
      </div>
    </div>
    <div class="vrow"><span class="vlbl">Dragon:</span><input class="vtxt" id="dname" type="text" placeholder="Dragon nickname..."></div>
  </div>
  <button class="startbtn" onclick="startWorld()">Enter Berk! 🐉</button>
</div>

<!-- WORLD -->

<div id="s-world" class="screen">
  <canvas id="wc"></canvas>
</div>

<!-- HUD -->

<div id="hud" style="display:none;">
  <div class="hbox">
    <div class="hname" id="hvname">Viking</div>
    <div style="font-size:.62em;color:#aad4ff" id="hdname"></div>
    <div id="hloc" style="font-size:.58em;color:#88ffcc;margin-top:1px;"></div>
  </div>
  <div class="hbox">
    <div class="hrow"><span class="hl">🍖 Food</span><div class="hbar"><div class="hfill ff" id="bf" style="width:70%"></div></div></div>
    <div class="hrow"><span class="hl">💧 Water</span><div class="hbar"><div class="hfill fw" id="bw" style="width:70%"></div></div></div>
    <div class="hrow"><span class="hl">😄 Happy</span><div class="hbar"><div class="hfill fh" id="bh" style="width:70%"></div></div></div>
    <div class="hrow"><span class="hl">🪙 Coins</span><div class="hbar"><div class="hfill fc" id="bc" style="width:0%"></div></div><span id="cnum">0</span></div>
  </div>
</div>

<div id="mbadge" style="display:none;">🚶 Walking</div>

<!-- Action bar -->

<div id="abar" style="display:none;">
  <button class="ab af" onclick="feedDragon()">🐟 Feed</button>
  <button class="ab aw" onclick="waterDragon()">💧 Water</button>
  <button class="ab aa" onclick="openArena()">🏋️ Train</button>
  <button class="ab at" onclick="openBattle()">⚔️ Battle</button>
  <button class="ab ash" onclick="openShop()">🔨 Shop</button>
  <button class="ab ag" onclick="openGameMenu()">🎮 Games</button>
  <button class="ab asl" onclick="trySleep()">🌙 Sleep</button>
  <button class="ab ahw" onclick="enterHiddenWorld()">🌀 Hidden World</button>
  <button class="ab arsc" onclick="startRescue()">🆘 Rescue</button>
  <button class="ab ahatch" onclick="openHatchery()">🥚 Hatchery</button>
</div>

<!-- Controls -->

<div id="ctrl" style="display:none;">
  <div id="dpad">
    <div></div>
    <div class="dp" onpointerdown="dk('up',1)" onpointerup="dk('up',0)" onpointerleave="dk('up',0)">▲</div>
    <div></div>
    <div class="dp" onpointerdown="dk('left',1)" onpointerup="dk('left',0)" onpointerleave="dk('left',0)">◄</div>
    <div style="background:rgba(0,0,0,.3);border-radius:8px;"></div>
    <div class="dp" onpointerdown="dk('right',1)" onpointerup="dk('right',0)" onpointerleave="dk('right',0)">►</div>
    <div></div>
    <div class="dp" onpointerdown="dk('down',1)" onpointerup="dk('down',0)" onpointerleave="dk('down',0)">▼</div>
    <div></div>
  </div>
  <div id="mbtns">
    <button class="mbtn am" id="mw" onclick="setMode('walk')">🚶 Walk</button>
    <button class="mbtn" id="mr" onclick="setMode('run')">💨 Run</button>
    <button class="mbtn" id="mf" onclick="setMode('fly')">🦅 Fly</button>
  </div>
</div>

<!-- Popup -->

<div id="pop">
  <div class="pb">
    <div class="pt" id="ptitle"></div>
    <div id="pbody"></div>
    <button class="cbtn" id="pclosebtn" onclick="closePop()">Close ✕</button>
  </div>
</div>

<!-- Lightning overlay for Skrill battle -->

<div class="ltng" id="ltng"></div>

<script>
// ============================================================
// DRAGON DEFINITIONS
// ============================================================
var DRAGONS = [
  {id:'toothless',  name:'Toothless',   type:'Night Fury',          color:'#1a1a2e',accent:'#3a3a6a',eye:'#22d3ee',shape:'sleek',  cls:'strike'},
  {id:'lightfury',  name:'Light Fury',  type:'Light Fury',          color:'#e0e8f0',accent:'#b0b8d0',eye:'#a0d8ef',shape:'sleek',  cls:'strike'},
  {id:'stormfly',   name:'Stormfly',    type:'Deadly Nadder',       color:'#2a6bc8',accent:'#ffd700',eye:'#ff6b35',shape:'nadder', cls:'sharp'},
  {id:'hookfang',   name:'Hookfang',    type:'Monstrous Nightmare', color:'#cc2200',accent:'#ff6600',eye:'#ffd700',shape:'nightmare',cls:'stoker'},
  {id:'meatlug',    name:'Meatlug',     type:'Gronckle',            color:'#7a6a5a',accent:'#5a4a3a',eye:'#ffd700',shape:'gronckle',cls:'boulder'},
  {id:'cloudjumper',name:'Cloudjumper', type:'Stormcutter',         color:'#8a5a2a',accent:'#d4a050',eye:'#ff6b35',shape:'sleek',  cls:'tidal'},
  {id:'reddeath',   name:'Red Death',   type:'Red Death',           color:'#8b0000',accent:'#ff2200',eye:'#ff0000',shape:'alpha',  cls:'alpha', alpha:true},
  {id:'bewilderbeast',name:'Bewilderbeast',type:'Bewilderbeast',    color:'#1a2a5a',accent:'#4080ff',eye:'#80c0ff',shape:'alpha',  cls:'alpha', alpha:true},
];

// ============================================================
// VIKING + GAME STATE
// ============================================================
var vik = {skin:'#f5c5a3',hair:'#3d2b1f',tunic:'#4a6741',helm:'iron',name:'Viking'};
var dragonDef = DRAGONS[0];
var drNick = 'Toothless';
var stats = {food:70,water:70,happy:70};
var coins = 0;
var ownedSaddles = [];
var alphaUnlocked = false;
var hatchedDragons = [];
var incubating = [];
var foundEggs = [];

// Movement
var drX=200,drY=0,velY=0,facing=1,animF=0;
var moveMode='walk';
var keys={up:0,down:0,left:0,right:0};
var WW=0,WH=0,GL=0; // world width, height, ground level

// World state
var isNight=false,dayT=0;
var inHiddenWorld=false;
var inHouse=false;
var chewT=0,drinkT=0; // animation timers
var mudT=0; // dragon in mud
var dragonMuddy=false;
var mudX=0,mudY=0; // mud pit location on screen
var bathX=0,bathY=0;
var nearMudDragon=false; // can pick up muddy dragon
var carryingMudDragon=false;
var nearBath=false;
var bathProgress=0;

// Sheep
var sheep=[];
var carryingSheep=null;
var penX=0,penY=0;
var SHEEP_COUNT=5;

// Wild dragons roaming
var wildDragons=[];

// Rescue mission
var rescueMission=null; // {x,y,found,dragonType}
var rescueActive=false;

// Coins
var floatCoins=[];

// Canvas
var wc,ctx;

// ============================================================
// TITLE SCREEN SETUP
// ============================================================
window.onload=function(){
  buildDragonGrid();
  drawVikingPreview();
};

var saddles=[
  {id:'basic', e:'🟤',n:'Basic Saddle',  p:5},
  {id:'royal', e:'👑',n:'Royal Saddle',  p:15},
  {id:'fire',  e:'🔥',n:'Fire Saddle',   p:20},
  {id:'shadow',e:'🌑',n:'Shadow Saddle', p:25},
  {id:'ice',   e:'❄️',n:'Ice Saddle',    p:30},
  {id:'golden',e:'✨',n:'Golden Saddle', p:40},
];

function buildDragonGrid(){
  var grid=document.getElementById('dgrid');
  DRAGONS.forEach(function(dr,i){
    var div=document.createElement('div');
    var isAlpha=dr.alpha;
    div.className='dcard'+(isAlpha?' alpha'+(alphaUnlocked?'':' locked'):'')+(i===0?' sel':'');
    div.onclick=function(){
      if(isAlpha&&!alphaUnlocked){showAlphaLocked();return;}
      document.querySelectorAll('.dcard').forEach(function(c){c.classList.remove('sel');});
      div.classList.add('sel');
      dragonDef=dr;
    };
    var cv=document.createElement('canvas');
    cv.width=85;cv.height=65;
    var cx2=cv.getContext('2d');
    drawDragonCtx(cx2,dr,32,52,0.62,true,false,0,false,false,false);
    div.appendChild(cv);
    var nm=document.createElement('div');nm.className='dn';nm.textContent=dr.name;div.appendChild(nm);
    var tp=document.createElement('div');tp.className='dt';tp.textContent=dr.type;div.appendChild(tp);
    if(isAlpha){
      var lb=document.createElement('div');lb.className='lock-badge';
      lb.textContent=alphaUnlocked?'✅ ALPHA':'🔒 LOCKED';div.appendChild(lb);
    }
    grid.appendChild(div);
  });
}

function showAlphaLocked(){
  showPop('👑 Alpha Class Locked',
    'The Alpha class dragons are the most powerful in the world! To unlock them, you must complete the SECRET SKRILL MISSION.\n\n⚡ The Skrill is a deadly lightning dragon that only appears during thunderstorms at night. Find it in the sky and defeat it to prove your worth!',
    '<button class="gbtn" onclick="startSkrillMission()">⚡ Begin Skrill Mission!</button>');
}

function sv(prop,val,el){
  vik[prop]=val;
  var grp=prop.substring(0,2)+'-opts';
  document.querySelectorAll('#'+grp+' .vopt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  drawVikingPreview();
}

function drawVikingPreview(){
  var cv=document.getElementById('vcanv');
  var cx2=cv.getContext('2d');
  cx2.clearRect(0,0,80,105);
  drawViking(cx2,vik,40,90,1);
}

// ============================================================
// WORLD START
// ============================================================
function startWorld(){
  vik.name=document.getElementById('vname').value||'Viking';
  drNick=document.getElementById('dname').value||dragonDef.name;
  document.getElementById('hvname').textContent=vik.name;
  document.getElementById('hdname').textContent=drNick+' the '+dragonDef.type;

  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('s-world').classList.add('active');

  ['hud','mbadge','abar','ctrl'].forEach(function(id){document.getElementById(id).style.display='';});
  document.getElementById('hud').style.display='flex';

  wc=document.getElementById('wc');
  ctx=wc.getContext('2d');
  resize();
  window.addEventListener('resize',resize);

  drX=WW*0.35; drY=0;
  mudX=WW*0.25; mudY=GL;
  bathX=WW*0.55; bathY=GL;
  penX=WW*0.12; penY=GL;

  initSheep();
  initWildDragons();
  spawnCoins();
  setInterval(spawnCoins,14000);
  setInterval(function(){changeStat('food',-1);changeStat('water',-1);},18000);
  setInterval(function(){dayT++;if(dayT>=90){dayT=0;toggleNight();}},1000);

  // Dragon wanders off to mud occasionally
  setInterval(function(){
    if(!dragonMuddy&&!inHiddenWorld&&Math.random()<0.3){
      dragonMuddy=true;
      showFlash('🐉 '+drNick+' wandered to the mud pit!');
    }
  },40000);

  requestAnimationFrame(gameLoop);
}

function resize(){
  WW=wc.width=window.innerWidth;
  WH=wc.height=window.innerHeight;
  GL=WH*0.58;
  mudX=WW*0.25;bathX=WW*0.55;penX=WW*0.12;
}

// ============================================================
// SHEEP
// ============================================================
function initSheep(){
  sheep=[];
  for(var i=0;i<SHEEP_COUNT;i++){
    sheep.push({
      x:WW*0.3+Math.random()*WW*0.5,
      y:GL,
      vx:(Math.random()-0.5)*0.6,
      inPen:false,
      id:i,
      wobble:Math.random()*Math.PI*2
    });
  }
}

// ============================================================
// WILD DRAGONS
// ============================================================
var WILD_TYPES=[
  {color:'#2a5a8a',acc:'#ffd700',eye:'#ff6b35',shape:'nadder'},
  {color:'#4a3a8a',acc:'#c0a0ff',eye:'#e0d0ff',shape:'sleek'},
  {color:'#8a3a2a',acc:'#ff8040',eye:'#ffd700',shape:'nightmare'},
  {color:'#5a8a4a',acc:'#80ff80',eye:'#ffff00',shape:'gronckle'},
];
function initWildDragons(){
  wildDragons=[];
  for(var i=0;i<4;i++){
    var t=WILD_TYPES[i%WILD_TYPES.length];
    wildDragons.push({
      x:WW*0.1+Math.random()*WW*0.8,
      y:GL,
      vx:(Math.random()-0.5)*1.2,
      facing:1,
      color:t.color,acc:t.acc,eye:t.eye,shape:t.shape,
      wobble:Math.random()*Math.PI*2,
      id:i
    });
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(){
  requestAnimationFrame(gameLoop);
  animF++;
  update();
  render();
}

function update(){
  var spd={walk:2.5,run:6,fly:4}[moveMode];
  if(keys.left){drX-=spd;facing=-1;}
  if(keys.right){drX+=spd;facing=1;}
  drX=Math.max(40,Math.min(WW-60,drX));

  if(moveMode==='fly'){
    if(keys.up) velY-=0.6;
    if(keys.down) velY+=0.6;
    velY*=0.9; drY-=velY;
    if(drY<0){drY=0;velY=0;}
    if(drY>WH*0.48){drY=WH*0.48;velY=0;}
  } else {drY=0;velY=0;}

  // Timers
  if(chewT>0) chewT--;
  if(drinkT>0) drinkT--;
  if(bathProgress>0&&nearBath&&carryingMudDragon) bathProgress=Math.min(100,bathProgress+0.3);

  // Sheep update
  sheep.forEach(function(s){
    if(s.inPen) return;
    s.wobble+=0.05;
    s.vx+=(Math.random()-0.5)*0.08;
    s.vx=Math.max(-1,Math.min(1,s.vx));
    s.x+=s.vx;
    s.x=Math.max(WW*0.05,Math.min(WW*0.95,s.x));
    // Check if near player to pick up
  });

  // Wild dragons update
  wildDragons.forEach(function(wd){
    wd.wobble+=0.04;
    wd.vx+=(Math.random()-0.5)*0.05;
    wd.vx=Math.max(-1.5,Math.min(1.5,wd.vx));
    wd.x+=wd.vx;
    wd.x=Math.max(WW*0.04,Math.min(WW*0.96,wd.x));
    wd.facing=wd.vx>0?1:-1;
  });

  // Proximity checks
  nearBath = Math.abs(drX-bathX)<70 && drY===0;
  nearMudDragon = dragonMuddy && Math.abs(drX-mudX)<65 && drY===0;

  // Rescue check
  if(rescueActive&&rescueMission&&!rescueMission.found){
    var rdx=rescueMission.x-drX, rdy=rescueMission.y-drY;
    if(Math.sqrt(rdx*rdx+rdy*rdy)<80){
      rescueMission.found=true;
      showFlash('🐉 Dragon found! Bring it home!');
      changeStat('happy',15);coins=Math.min(200,coins+5);updateCoins();
    }
  }
  if(rescueActive&&rescueMission&&rescueMission.found){
    // Dragon follows player
    rescueMission.x+=(drX-rescueMission.x)*0.04;
    rescueMission.y+=(drY-rescueMission.y)*0.04;
    // If back near spawn
    if(Math.abs(drX-WW*0.5)<100&&drY===0&&moveMode!=='fly'){
      rescueActive=false;
      rescueMission=null;
      showPop('🎉 Dragon Rescued!','You brought the lost dragon safely back to Berk! The dragon nuzzles you warmly.','<div class="ow">+20 Happy! +8 Coins! 🐉</div>');
      changeStat('happy',20);coins=Math.min(200,coins+8);updateCoins();
    }
  }

  // Coin proximity
  for(var i=floatCoins.length-1;i>=0;i--){
    var fc=floatCoins[i];
    var dcx=fc.x-drX,dcy=fc.y-(GL-drY-30);
    if(Math.sqrt(dcx*dcx+dcy*dcy)<52){
      floatCoins.splice(i,1);
      coins=Math.min(200,coins+1);updateCoins();
      showFlash('+1 🪙');
    }
  }
}

// ============================================================
// RENDER
// ============================================================
function render(){
  ctx.clearRect(0,0,WW,WH);
  if(inHiddenWorld) renderHiddenWorld();
  else if(inHouse) renderInside();
  else renderOutdoor();
}

// ---- OUTDOOR ----
function renderOutdoor(){
  // Sky
  var sg=ctx.createLinearGradient(0,0,0,GL);
  if(isNight){sg.addColorStop(0,'#020310');sg.addColorStop(1,'#0a1430');}
  else{sg.addColorStop(0,'#1a7ec8');sg.addColorStop(1,'#87CEEB');}
  ctx.fillStyle=sg;ctx.fillRect(0,0,WW,GL);

  // Stars / sun / moon
  if(isNight){drawNight();}else{drawDay();}

  // Mountains (3D layered)
  drawMountains();

  // Ground (3D gradient with shading)
  drawGround3D();

  // Locations
  drawLocation3D(WW*0.10,GL,'🏘️','Village',drawHouse3D);
  drawBlacksmith3D(WW*0.42,GL);
  drawFishStand3D(WW*0.20,GL);
  drawWateringHole3D(WW*0.60,GL);
  drawArena3D(WW*0.78,GL);
  drawMudPit3D(mudX,GL);
  drawBath3D(bathX,GL);
  drawSheepPen3D(penX,GL);
  drawTropicalIsland3D(WW*0.88,GL);

  // Hatchery
  drawHatchery3D(WW*0.32,GL);

  // Hidden World portal
  drawPortal3D(WW*0.68,GL);

  // Wild dragons
  wildDragons.forEach(function(wd){
    var wx=wd.x, wy=GL-20+Math.sin(wd.wobble)*3;
    var wdr={color:wd.color,accent:wd.acc,eye:wd.eye,bodyShape:wd.shape};
    drawDragonCtx(ctx,{color:wd.color,accent:wd.acc,eye:wd.eye,bodyShape:wd.shape},wx+50,wy,0.55,wd.facing===1,false,animF,false,false,false);
  });

  // Sheep
  sheep.forEach(function(s){
    if(!s.inPen) drawSheep3D(s.x,s.y,s);
  });
  // Sheep in pen
  var penned=sheep.filter(function(s){return s.inPen;});
  penned.forEach(function(s,i){
    drawSheep3D(penX-20+i*22,GL-5,s);
  });

  // Muddy dragon at mud pit
  if(dragonMuddy&&!carryingMudDragon){
    var mud3={color:'#5a4a30',accent:'#3a2a10',eye:'#886644',bodyShape:dragonDef.bodyShape};
    drawDragonCtx(ctx,mud3,mudX+50,GL-20,0.8,true,false,animF,false,false,false);
    if(nearMudDragon){
      labelAt(ctx,'Tap to pick up!',mudX,GL-95,'#ffd700');
    }
  }

  // Rescue dragon
  if(rescueMission&&rescueMission.found){
    drawDragonCtx(ctx,{color:'#a07050',accent:'#d4a070',eye:'#ffd700',bodyShape:'nadder'},
      rescueMission.x+50,rescueMission.y+GL-30,0.65,true,false,animF,false,false,false);
  }
  if(rescueActive&&rescueMission&&!rescueMission.found){
    // Show hidden dragon hint
    if(Math.abs(drX-rescueMission.x)<200){
      var alpha2=1-Math.abs(drX-rescueMission.x)/200;
      ctx.globalAlpha=alpha2*0.7;
      drawDragonCtx(ctx,{color:'#a07050',accent:'#d4a070',eye:'#ffd700',bodyShape:'nadder'},
        rescueMission.x+50,rescueMission.y+GL-30,0.65,true,false,animF,false,false,false);
      ctx.globalAlpha=1;
    }
  }

  // Coins
  floatCoins.forEach(function(fc,i){
    var cy=fc.y+Math.sin(animF*0.07+i)*8;
    ctx.font='18px serif';ctx.textAlign='center';
    ctx.fillText('🪙',fc.x,cy);
  });

  // Player dragon
  var dsy=GL-drY-30;
  var dscale=moveMode==='fly'?1.2:1.0;

  // Shadow
  if(!inHiddenWorld){
    var shw=Math.max(0.1,1-drY/300);
    ctx.save();ctx.globalAlpha=shw*0.3;
    ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(drX+50,GL+4,35*shw,8*shw,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Carrying sheep display
  if(carryingSheep){
    ctx.font='22px serif';ctx.textAlign='center';
    ctx.fillText('🐑',drX+50,dsy-50);
  }
  if(carryingMudDragon){
    var mud3b={color:'#5a4a30',accent:'#3a2a10',eye:'#886644',bodyShape:dragonDef.bodyShape};
    drawDragonCtx(ctx,mud3b,drX+120,dsy-20,0.5,true,false,animF,false,false,false);
    if(nearBath){
      var bpct=bathProgress/100;
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(drX-20,dsy-80,100,12,6);ctx.fill();
      ctx.fillStyle='#4fc3f7';ctx.beginPath();ctx.roundRect(drX-20,dsy-80,100*bpct,12,6);ctx.fill();
      labelAt(ctx,'Bathing... '+Math.floor(bathProgress)+'%',drX+30,dsy-88,'#4fc3f7');
      if(bathProgress>=100){
        dragonMuddy=false;carryingMudDragon=false;bathProgress=0;
        showPop('🛁 All Clean!',drNick+' is sparkling clean! The dragon shakes joyfully and nuzzles you!','<div class="ow">+15 Happy! ✨</div>');
        changeStat('happy',15);
      }
    }else{
      labelAt(ctx,'Take to bathtub!',drX+50,dsy-90,'#4fc3f7');
    }
  }

  // Main dragon draw
  drawDragonCtx(ctx,dragonDef,drX+60,dsy+10,dscale,facing===1,moveMode==='fly',animF,chewT>0,drinkT>0,false);

  // Viking
  var vbob=(keys.left||keys.right)&&moveMode!=='fly'?Math.sin(animF*0.3)*4:0;
  if(moveMode!=='fly'){
    drawViking(ctx,vik,drX,GL-2+vbob,0.88);
  } else {
    drawVikingRiding(ctx,vik,drX+60,dsy+10,dscale,facing===1);
  }

  // Bath completion
  if(nearBath&&!carryingMudDragon&&!dragonMuddy){
    labelAt(ctx,'🛁 Bathtub',bathX,GL-90,'#4fc3f7');
  }

  // Biome label
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='12px Cinzel,Georgia';ctx.textAlign='center';
  ctx.fillText('Isle of Berk',WW/2,GL-8);

  // Sleep / enter house prompt
  if(Math.abs(drX-WW*0.10)<80&&drY===0){
    labelAt(ctx,'Enter house? → Sleep',WW*0.10,GL-120,'#ffd700');
  }
}

function drawDay(){
  ctx.fillStyle='#ffe44a';
  ctx.beginPath();ctx.arc(WW-80,48,26,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,228,74,.25)';
  ctx.beginPath();ctx.arc(WW-80,48,42,0,Math.PI*2);ctx.fill();
  // Clouds
  drawCloud3D(100,55,1.0);drawCloud3D(WW*0.5,38,0.8);drawCloud3D(WW*0.75,65,1.1);
}

function drawNight(){
  ctx.fillStyle='rgba(255,255,200,0.85)';
  for(var s=0;s<70;s++){
    var sx=((s*197+83)%WW),sy=((s*113+47)%(GL-50));
    var ss=Math.sin(animF*0.03+s)*0.5+1;
    ctx.beginPath();ctx.arc(sx,sy,ss,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#fffbe6';ctx.beginPath();ctx.arc(WW-90,52,24,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(5,5,30,.45)';ctx.beginPath();ctx.arc(WW-100,46,20,0,Math.PI*2);ctx.fill();
}

function drawCloud3D(x,y,sc){
  ctx.save();ctx.scale(sc,sc);
  ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.beginPath();ctx.ellipse(x/sc,y/sc,42,20,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(200,210,230,.6)';
  ctx.beginPath();ctx.ellipse(x/sc+5,(y+8)/sc,42,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.beginPath();ctx.ellipse((x-28)/sc,(y+4)/sc,26,16,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse((x+24)/sc,(y+6)/sc,22,14,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawMountains(){
  // Far mountains (light, 3D depth)
  ctx.fillStyle=isNight?'#0a1a10':'#4a8a5a';
  ctx.beginPath();ctx.moveTo(0,GL);
  var mpts=[[0,GL],[50,GL-80],[130,GL-55],[230,GL-110],[370,GL-75],[480,GL-130],[590,GL-85],[700,GL-105],[WW,GL-65],[WW,GL]];
  mpts.forEach(function(p){ctx.lineTo(p[0],p[1]);});ctx.fill();
  // Snow caps
  ctx.fillStyle='rgba(255,255,255,.5)';
  [[230,GL-110],[480,GL-130],[700,GL-105]].forEach(function(p){
    ctx.beginPath();ctx.moveTo(p[0]-15,p[1]+20);ctx.lineTo(p[0],p[1]);ctx.lineTo(p[0]+15,p[1]+20);ctx.fill();
  });
  // Near mountains (darker)
  ctx.fillStyle=isNight?'#060e08':'#2a5a2a';
  ctx.beginPath();ctx.moveTo(0,GL);ctx.lineTo(0,GL-30);ctx.lineTo(WW,GL-30);ctx.lineTo(WW,GL);ctx.fill();
}

function drawGround3D(){
  // Main ground
  var gg=ctx.createLinearGradient(0,GL,0,WH);
  gg.addColorStop(0,isNight?'#182812':'#3d6b2a');
  gg.addColorStop(0.25,isNight?'#0e1c0a':'#2a5a1a');
  gg.addColorStop(1,'#080d04');
  ctx.fillStyle=gg;ctx.fillRect(0,GL,WW,WH-GL);
  // Ground shading lines for 3D perspective
  ctx.strokeStyle=isNight?'rgba(0,80,0,.18)':'rgba(0,120,0,.22)';ctx.lineWidth=1.5;
  for(var ln=1;ln<8;ln++){
    var lny=GL+ln*(WH-GL)/8;
    ctx.beginPath();ctx.moveTo(0,lny);ctx.lineTo(WW,lny);ctx.stroke();
  }
  // Grass tufts
  ctx.fillStyle=isNight?'#1a3010':'#4a7c2a';
  for(var g=0;g<WW;g+=16){
    var gh=5+Math.sin(g*0.31)*3;
    ctx.beginPath();ctx.moveTo(g,GL);ctx.lineTo(g+3,GL-gh);ctx.lineTo(g+7,GL);ctx.fill();
  }
}

// 3D location drawers
function drawHouse3D(x,gl){
  var w=100,h=88;
  // Shadow under house
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(x,gl+6,w/2+10,10,0,0,Math.PI*2);ctx.fill();
  // Foundation (3D bottom)
  ctx.fillStyle='#4a3a2a';ctx.beginPath();
  ctx.moveTo(x-w/2-5,gl);ctx.lineTo(x+w/2+5,gl);
  ctx.lineTo(x+w/2+12,gl+10);ctx.lineTo(x-w/2-12,gl+10);ctx.closePath();ctx.fill();
  // Back wall (darker for depth)
  ctx.fillStyle='#5a4a3a';ctx.fillRect(x-w/2+5,gl-h-3,w,h+3);
  // Front face
  var wg=ctx.createLinearGradient(x-w/2,gl-h,x+w/2,gl);
  wg.addColorStop(0,'#9a8a7a');wg.addColorStop(1,'#7a6a5a');
  ctx.fillStyle=wg;ctx.fillRect(x-w/2,gl-h,w,h);
  // Side face (right, 3D)
  ctx.fillStyle='#6a5a4a';
  ctx.beginPath();ctx.moveTo(x+w/2,gl-h);ctx.lineTo(x+w/2+10,gl-h-5);ctx.lineTo(x+w/2+10,gl+5);ctx.lineTo(x+w/2,gl);ctx.fill();
  // Planks
  ctx.strokeStyle='rgba(60,40,20,.4)';ctx.lineWidth=1.5;
  for(var p=0;p<h;p+=13){ctx.beginPath();ctx.moveTo(x-w/2,gl-h+p);ctx.lineTo(x+w/2,gl-h+p);ctx.stroke();}
  // Roof
  ctx.fillStyle='#3a2010';
  ctx.beginPath();ctx.moveTo(x-w/2-14,gl-h);ctx.lineTo(x+4,gl-h-52);ctx.lineTo(x+w/2+14,gl-h);ctx.fill();
  // Roof side
  ctx.fillStyle='#2a1508';
  ctx.beginPath();ctx.moveTo(x+w/2+14,gl-h);ctx.lineTo(x+w/2+24,gl-h-5);ctx.lineTo(x+14,gl-h-57);ctx.lineTo(x+4,gl-h-52);ctx.fill();
  // Door
  ctx.fillStyle='#2a1508';ctx.beginPath();ctx.roundRect(x-14,gl-48,28,48,4);ctx.fill();
  ctx.fillStyle='rgba(255,160,0,.12)';ctx.beginPath();ctx.roundRect(x-14,gl-48,28,48,4);ctx.fill();
  ctx.fillStyle='#c8a000';ctx.beginPath();ctx.arc(x+9,gl-24,3,0,Math.PI*2);ctx.fill();
  // Windows (glow at night)
  ctx.fillStyle=isNight?'rgba(255,200,80,.7)':'rgba(255,240,180,.55)';
  ctx.beginPath();ctx.roundRect(x-w/2+10,gl-h+18,22,18,3);ctx.fill();
  ctx.beginPath();ctx.roundRect(x+w/2-32,gl-h+18,22,18,3);ctx.fill();
  // Chimney
  ctx.fillStyle='#4a3a2a';ctx.fillRect(x+w/2-22,gl-h-28,13,30);
  ctx.fillStyle='rgba(200,200,200,.35)';
  for(var sm=0;sm<3;sm++){
    var puffY=(animF*0.25+sm*18)%55;
    var puffX=Math.sin(puffY*0.12)*6;
    ctx.beginPath();ctx.arc(x+w/2-16+puffX,gl-h-30-puffY,5+sm*2.5,0,Math.PI*2);ctx.fill();
  }
}

function drawLocation3D(x,gl,icon,label,fn){
  if(fn) fn(x,gl);
  labelAt(ctx,icon+' '+label,x,gl-170,'rgba(255,255,255,.9)');
}

function drawBlacksmith3D(x,gl){
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(x,gl+6,48,9,0,0,Math.PI*2);ctx.fill();
  // Building
  ctx.fillStyle='#5a4a3a';ctx.fillRect(x-38,gl-82,76,82);
  var bg=ctx.createLinearGradient(x-38,gl-82,x+38,gl);bg.addColorStop(0,'#7a6a5a');bg.addColorStop(1,'#5a4a3a');
  ctx.fillStyle=bg;ctx.fillRect(x-36,gl-80,72,80);
  // Side 3D
  ctx.fillStyle='#4a3a2a';ctx.beginPath();ctx.moveTo(x+36,gl-80);ctx.lineTo(x+46,gl-86);ctx.lineTo(x+46,gl+4);ctx.lineTo(x+36,gl);ctx.fill();
  // Roof
  ctx.fillStyle='#2a1508';ctx.beginPath();ctx.moveTo(x-50,gl-80);ctx.lineTo(x+2,gl-112);ctx.lineTo(x+50,gl-80);ctx.fill();
  ctx.fillStyle='#1a0d04';ctx.beginPath();ctx.moveTo(x+50,gl-80);ctx.lineTo(x+60,gl-86);ctx.lineTo(x+12,gl-118);ctx.lineTo(x+2,gl-112);ctx.fill();
  // Door
  ctx.fillStyle='#1a0a00';ctx.beginPath();ctx.roundRect(x-13,gl-48,26,48,3);ctx.fill();
  // Forge glow
  var fg=ctx.createRadialGradient(x,gl-28,2,x,gl-28,32);
  fg.addColorStop(0,'rgba(255,120,0,.5)');fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg;ctx.beginPath();ctx.arc(x,gl-28,32,0,Math.PI*2);ctx.fill();
  ctx.font='20px serif';ctx.textAlign='center';ctx.fillText('⚒️',x,gl-90);
  labelAt(ctx,'🔨 Blacksmith',x,gl-120,'#ffd700');
}

function drawFishStand3D(x,gl){
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x,gl+5,52,8,0,0,Math.PI*2);ctx.fill();

function renderHiddenWorld(){
  // Dark luminescent cave
  var bg=ctx.createLinearGradient(0,0,0,WH);

  pg.addColorStop(0,'rgba(0,200,255,.35)');pg.addColorStop(1,'transparent');
  ctx.fillStyle=pg;ctx.fillRect(0,0,WW,WH);

  // Glowing water
  var hwGL=WH*0.72;
  var wg2=ctx.createLinearGradient(0,hwGL,0,WH);
  wg2.addColorStop(0,'#001030');wg2.addColorStop(0.5,'#002060');wg2.addColorStop(1,'#001040');

  ctx.fillStyle='rgba(0,150,255,.15)';

  }

  // Floating light creatures
  for(var lc=0;lc<8;lc++){
    var lcx=WW*0.1+((lc*WW*0.1+animF*0.3)%(WW*0.8));
    var lcy=WH*0.3+Math.sin(animF*0.04+lc*0.8)*WH*0.15;
    var lcr=ctx.createRadialGradient(lcx,lcy,0,lcx,lcy,22);
    lcr.addColorStop(0,'rgba(100,200,255,0.9)');lcr.addColorStop(1,'transparent');
    ctx.fillStyle=lcr;ctx.beginPath();ctx.arc(lcx,lcy,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(150,220,255,0.95)';ctx.beginPath();ctx.arc(lcx,lcy,4,0,Math.PI*2);ctx.fill();
  }

  // Other light furies flying around
  for(var lf=0;lf<3;lf++){
    var lfx=WW*0.2+((lf*WW*0.3+animF*1.2)%(WW*0.7));
    var lfy=WH*0.2+Math.sin(animF*0.06+lf*2)*WH*0.2;
    drawDragonCtx(ctx,{color:'#e0eeff',accent:'#b0d0f0',eye:'#a0d8ef',bodyShape:'sleek'},lfx+40,lfy,0.55,true,true,animF,false,false,false);
  }

  // Ground in hidden world
  var hwG2=WH*0.68;
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,hwG2,WW,WH-hwG2);
  ctx.strokeStyle='rgba(0,100,200,.4)';ctx.lineWidth=1;
  for(var cl=0;cl<10;cl++){
    ctx.beginPath();ctx.moveTo(cl*WW/10,hwG2);ctx.lineTo(WW/2,WH);ctx.stroke();
  }

  // Exit portal
  var ex=60,ey=hwG2;
  ctx.fillStyle='rgba(150,0,255,.4)';ctx.beginPath();ctx.ellipse(ex,ey-30,25,40,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aa40ff';ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(ex,ey-30,25,40,0,0,Math.PI*2);ctx.stroke();
  labelAt(ctx,'← Exit',ex,ey-80,'#c080ff');

  // Floating coins in hidden world
  floatCoins.forEach(function(fc,i){
    var cy2=fc.y+Math.sin(animF*0.07+i)*8;
    ctx.font='18px serif';ctx.textAlign='center';ctx.fillText('🪙',fc.x,cy2);
  });

  // Player dragon
  var hwGL2=hwG2;
  var dsy=hwGL2-drY-30;
  ctx.fillStyle='rgba(0,100,255,.15)';ctx.beginPath();ctx.ellipse(drX+50,hwGL2+4,30,7,0,0,Math.PI*2);ctx.fill();
  drawDragonCtx(ctx,dragonDef,drX+60,dsy+10,1.15,facing===1,moveMode==='fly',animF,chewT>0,drinkT>0,false);
  if(moveMode!=='fly') drawViking(ctx,vik,drX,hwGL2-2+Math.sin(animF*0.3)*2,0.85);

  ctx.fillStyle='rgba(100,200,255,.6)';ctx.font='14px Cinzel,Georgia';ctx.textAlign='center';
  ctx.fillText('✨ The Hidden World ✨',WW/2,30);
  labelAt(ctx,'Move left to exit →',60,hwG2-90,'#aa80ff');
}

function drawCrystals(){
  var crystalColors=['#0080ff','#00ffcc','#8000ff','#ff00aa','#00ff80'];
  // Ceiling crystals
  for(var c=0;c<18;c++){
    var cx3=WW*0.05+c*(WW*0.9/17);
    var ch=30+Math.sin(c*1.3)*20;
    var cc=crystalColors[c%crystalColors.length];
    ctx.fillStyle=cc.replace(')',',0.6)').replace('rgb','rgba');
    ctx.beginPath();ctx.moveTo(cx3-8,0);ctx.lineTo(cx3+8,0);ctx.lineTo(cx3+4,ch);ctx.lineTo(cx3-4,ch);ctx.fill();
    // Glow
    var cg=ctx.createRadialGradient(cx3,ch,0,cx3,ch,20);
    cg.addColorStop(0,cc.replace(')',',0.3)').replace('rgb','rgba'));cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx3,ch,20,0,Math.PI*2);ctx.fill();
  }
  // Floor crystals
  var fl=WH*0.68;
  for(var c2=0;c2<12;c2++){
    var cx4=WW*0.06+c2*(WW*0.88/11);
    var ch2=15+Math.sin(c2*1.7)*10;
    var cc2=crystalColors[c2%crystalColors.length];
    ctx.fillStyle=cc2.replace(')',',0.5)').replace('rgb','rgba');
    ctx.beginPath();ctx.moveTo(cx4-5,fl);ctx.lineTo(cx4+5,fl);ctx.lineTo(cx4+2,fl-ch2);ctx.lineTo(cx4-2,fl-ch2);ctx.fill();
  }
}

function drawDragonCtx(ctx2,dr,x,y,scale,faceR,flying,frame,chewing,drinking,isAlpha){
  ctx2.save();ctx2.translate(x,y);
  if(!faceR) ctx2.scale(-1,1);
  ctx2.scale(scale,scale);

function lighten(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.floor(r+255*amt));g=Math.min(255,Math.floor(g+255*amt));b=Math.min(255,Math.floor(b+255*amt));
  return'#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}
function labelAt(ctx2,text,x,y,color){
  ctx2.font='11px Cinzel,Georgia';ctx2.textAlign='center';
  var w=ctx2.measureText(text).width;
  ctx2.fillStyle='rgba(0,0,0,.55)';ctx2.beginPath();ctx2.roundRect(x-w/2-5,y-12,w+10,16,5);ctx2.fill();
  ctx2.fillStyle=color||'#ffd700';ctx2.fillText(text,x,y);
}

// Sheep interaction
wc&&wc.addEventListener('click',handleClick);
function handleClick(e){
  var ex=e.clientX,ey=e.clientY;
  // Sheep grab / drop
  if(!carryingSheep){
    for(var i=0;i<sheep.length;i++){
      var s=sheep[i];
      if(!s.inPen&&Math.abs(s.x-ex)<40&&Math.abs(s.y-ey)<40){
        carryingSheep=s;showFlash('🐑 Carrying sheep!');return;
      }
    }
  } else {
    // Drop in pen?
    if(ex>penX-70&&ex<penX+70&&ey>GL-60&&ey<GL+20){
      carryingSheep.inPen=true;carryingSheep.x=penX-20+(sheep.filter(function(s){return s.inPen;}).length-1)*22;
      carryingSheep.y=GL-5;carryingSheep=null;
      showFlash('🐑 Sheep penned!');
      changeStat('happy',5);coins=Math.min(200,coins+1);updateCoins();
    } else {
      carryingSheep.x=ex;carryingSheep.y=ey;carryingSheep=null;showFlash('🐑 Sheep dropped!');
    }
    return;
  }
  // Muddy dragon pick up
  if(dragonMuddy&&!carryingMudDragon&&Math.abs(mudX-ex)<70&&Math.abs(GL-ey)<60){
    carryingMudDragon=true;showFlash('🐉 Carrying muddy '+drNick+'!');
  }
}

// ============================================================
var skrillMission=false;
var skrillX=0,skrillY=0,skrillHP=100,playerHP=100;
var lightningBolts=[];
var skrillBattle=null;

function startSkrillMission(){
  closePop();
  if(!isNight){
    showPop('⚡ Wait for Night!','The Skrill only appears during thunderstorms at night! Wait until nightfall, or...','<button class="gbtn" onclick="isNight=true;dayT=60;closePop();showFlash(\'⛈️ A storm rolls in!\');setTimeout(startSkrillMission,1000)">⛈️ Call the Storm!</button>');
    return;
  }
  skrillMission=true;
  skrillX=WW*0.5;skrillY=WH*0.25;skrillHP=100;playerHP=100;
  lightningBolts=[];
  setMode('fly');
  showPop('⚡ The Skrill Appears!',
    '⚡ CRACK! Lightning splits the sky! The Skrill swoops down from the storm clouds!\n\nThis electric dragon shoots lightning bolts! Dodge them and fight back!\n\nFly in the sky and attack — watch out for its lightning!',
    '<button class="gbtn" onclick="closePop();runSkrillBattle()">⚔️ Engage!</button>');
}

function runSkrillBattle(){
  if(!skrillMission) return;
  skrillBattle={round:0};
  doSkrillRound();
}

function doSkrillRound(){
  if(!skrillMission) return;
  if(skrillHP<=0){winSkrillMission();return;}
  if(playerHP<=0){
    skrillMission=false;
    showPop('💔 Defeated by the Skrill','The Skrill\'s lightning was too powerful! But you fought bravely. Try again when the next storm comes!','<div class="ol">Retreat to Berk...</div>');
    return;
  }
  // Spawn lightning bolt effect
  flashLightning();

  var sDmg=Math.floor(8+Math.random()*12);
  var html=
    '<div class="hprow"><div class="hpbox"><div class="hplbl">'+drNick+'</div><div class="hpbar"><div class="hpfill" style="width:'+playerHP+'%;background:linear-gradient(90deg,#27ae60,#2ecc71)"></div></div><div style="font-size:.7em;color:#aad4ff">'+playerHP+'/100</div></div>'+
    '<div class="hpbox"><div class="hplbl">⚡ Skrill</div><div class="hpbar"><div class="hpfill" style="width:'+skrillHP+'%"></div></div><div style="font-size:.7em;color:#aad4ff">'+skrillHP+'/100</div></div></div>'+
    '<div class="efac">⚡</div>'+
    '<p style="color:#aad4ff;font-size:.8em;margin-bottom:7px">⚡ Skrill charges up lightning! Dodge and attack!</p>'+
    '<div class="arena-btns">'+
    '<div class="abtn2" onclick="skrillAttack(\'blast\','+sDmg+')">🔥 Fire Blast<br><span style="font-size:.72em;color:#aad4ff">Strong attack</span></div>'+
    '<div class="abtn2" onclick="skrillAttack(\'dodge\','+sDmg+')">💨 Barrel Roll<br><span style="font-size:.72em;color:#aad4ff">Dodge lightning</span></div>'+
    '<div class="abtn2" onclick="skrillAttack(\'dive\','+sDmg+')">🌀 Power Dive<br><span style="font-size:.72em;color:#aad4ff">Risky but huge</span></div>'+
    '<div class="abtn2" onclick="skrillAttack(\'shield\','+sDmg+')">🛡️ Shield Up<br><span style="font-size:.72em;color:#aad4ff">Reduce damage</span></div>'+
    '</div>';
  document.getElementById('ptitle').textContent='⚡ Skrill Battle! Round '+(++skrillBattle.round);
  document.getElementById('pbody').innerHTML=html;
  document.getElementById('pop').classList.add('open');
  document.getElementById('pclosebtn').style.display='none';
}

function flashLightning(){
  var lt=document.getElementById('ltng');
  lt.style.background='radial-gradient(ellipse at '+(30+Math.random()*40)+'% '+(20+Math.random()*30)+'%, rgba(180,140,255,.3) 0%, transparent 70%)';
  lt.classList.add('flash');
  setTimeout(function(){lt.classList.remove('flash');},120);
}

function skrillAttack(type,sDmg){
  var pDmg,enemyDmg,msg;
  if(type==='blast'){pDmg=Math.floor(18+Math.random()*12);enemyDmg=Math.floor(sDmg*.7);msg='🔥 '+drNick+' fires a plasma blast for '+pDmg+' damage!';}
  else if(type==='dodge'){
    var dodged=Math.random()>0.35;
    pDmg=dodged?Math.floor(12+Math.random()*10):0;
    enemyDmg=dodged?0:Math.floor(sDmg*.9);
    msg=dodged?'💨 Perfect barrel roll! No lightning hit! Counter for '+pDmg+'!':'💨 Missed the dodge! ZAP! Full lightning hit!';
    if(!dodged) flashLightning();
  }
  else if(type==='dive'){
    var crit=Math.random()>0.45;
    pDmg=crit?Math.floor(30+Math.random()*20):Math.floor(5+Math.random()*8);
    enemyDmg=crit?2:Math.floor(sDmg*1.1);
    msg=crit?'🌀 POWER DIVE! Hit for '+pDmg+' massive damage!':'🌀 Dive missed — full lightning blast! Ouch!';
    if(!crit) flashLightning();
  }
  else{pDmg=Math.floor(6+Math.random()*7);enemyDmg=Math.floor(sDmg*.3);msg='🛡️ Shielded! Only '+enemyDmg+' damage taken. Dealt '+pDmg+'.';}

  skrillHP=Math.max(0,skrillHP-pDmg);
  playerHP=Math.max(0,playerHP-enemyDmg);

  var resultHTML='<div style="background:rgba(255,255,255,.06);border-radius:9px;padding:9px;margin-bottom:9px;color:#e0d0b0;font-size:.85em;line-height:1.6">'+msg+'</div>';
  document.getElementById('pbody').innerHTML=resultHTML;
  document.getElementById('ptitle').textContent='Result...';
  setTimeout(doSkrillRound,1100);
}

function winSkrillMission(){
  skrillMission=false;alphaUnlocked=true;
  document.getElementById('pclosebtn').style.display='';
  flashLightning();setTimeout(flashLightning,200);setTimeout(flashLightning,400);
  showPop('🏆 SKRILL DEFEATED!',
    '⚡ BOOM! The Skrill crashes into the waves, stunned! You stand victorious in the storm!\n\n👑 The Alpha Class dragons bow to you — you\'ve proven yourself the greatest dragon rider in history!',
    '<div class="ow" style="font-size:1.1em">🔓 ALPHA CLASS UNLOCKED!<br>Red Death & Bewilderbeast now available!</div>'+
    '<div style="margin-top:10px"><button class="gbtn" onclick="closePop();document.getElementById(\'dgrid\').innerHTML=\'\';buildDragonGrid();">Go Pick an Alpha Dragon!</button></div>');
  coins=Math.min(200,coins+20);updateCoins();changeStat('happy',30);
}

var eggTypes=[

  {e:'🔵',n:'Nadder Egg',       color:'#2a6bc8',acc:'#ffd700',eye:'#ff6b35',shape:'nadder', days:1},
  {e:'🔴',n:'Nightmare Egg',    color:'#cc2200',acc:'#ff6600',eye:'#ffd700',shape:'nightmare',days:3},

function openHatchery(){

  });

  if(hatchedDragons.length>0){
    html+='<p style="color:#ffd700;font-family:Cinzel;font-size:.82em;margin-top:9px">Hatched Dragons:</p>';

var eggIdCounter=0;
function findEgg(){
  var eg=eggTypes[Math.floor(Math.random()*eggTypes.length)];
  foundEggs.push(eg);
  closePop();
  showPop('🥚 Egg Found!','You searched deep in a volcanic cave and discovered... a '+eg.n+'! '+eg.e+'\n\nBring it to the hatchery incubator to warm it up!','<div class="ow">New egg added!</div>');
}

function incubateEgg(idx){
  if(incubating.find(function(e){return e.idx===idx;})) return;
  var id='egg_'+(eggIdCounter++);
  incubating.push({id:id,idx:idx,egg:foundEggs[idx],startTime:Date.now()});
  showFlash('🌡️ Egg warming up!');
  openHatchery();
}

function hatchEgg(id){
  var inc=incubating.find(function(e){return e.id===id;});
  if(!inc) return;
  incubating=incubating.filter(function(e){return e.id!==id;});
  foundEggs.splice(inc.idx,1);
  var newDragon={name:inc.egg.n.replace(' Egg',''),color:inc.egg.color,accent:inc.egg.acc,eye:inc.egg.eye,bodyShape:inc.egg.shape};
  hatchedDragons.push(newDragon);
  wildDragons.push({x:WW*0.5,y:GL,vx:.5,facing:1,color:newDragon.color,acc:newDragon.accent,eye:newDragon.eye,shape:newDragon.bodyShape,wobble:0,id:wildDragons.length});
  showPop('🐣 HATCHED!','CRACK! The '+inc.egg.n+' hatches! A tiny baby dragon stumbles out, blinks at you, and lets out a huge sneeze that blasts a little flame!','<div class="ow">🐉 '+newDragon.name+' joins the island!</div>');
}

var enemies=[

  {n:'Bewilderbeast', e:'❄️',hp:100,atks:['Ice Blast','Tidal Wave','Roar','Freeze'],weak:'eyes'},

var battleState=null;
function openBattle(){
  var html='<p style="color:#e0d0b0;margin-bottom:9px">Choose your enemy:</p><div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap;">';
  enemies.forEach(function(en,i){

  });

function startBattle(idx){
  battleState=JSON.parse(JSON.stringify({enemy:enemies[idx],playerHP:100,turn:0}));
  renderBattle();
}
function renderBattle(){
  if(!battleState) return;
  var b=battleState;
  var eatk=b.enemy.atks[Math.floor(Math.random()*b.enemy.atks.length)];
  var html=
    '<div class="hprow"><div class="hpbox"><div class="hplbl">'+drNick+'</div><div class="hpbar"><div class="hpfill" style="width:'+b.playerHP+'%;background:linear-gradient(90deg,#27ae60,#2ecc71)"></div></div><div style="font-size:.7em;color:#aad4ff">'+b.playerHP+'/100</div></div>'+
    '<div class="hpbox"><div class="hplbl">'+b.enemy.n+'</div><div class="hpbar"><div class="hpfill" style="width:'+b.enemy.hp+'%"></div></div><div style="font-size:.7em;color:#aad4ff">'+b.enemy.hp+'/100</div></div></div>'+
    '<div class="efac">'+b.enemy.e+'</div>'+
    '<p style="color:#aad4ff;font-size:.78em;margin-bottom:7px">'+b.enemy.n+' uses: <strong style="color:#e74c3c">'+eatk+'</strong></p>'+
    '<div class="arena-btns">'+
    '<div class="abtn2" onclick="battleAttack(\'blast\',\''+eatk+'\')">🔥 Fire Blast<br><span style="font-size:.7em;color:#aad4ff">Big damage</span></div>'+
    '<div class="abtn2" onclick="battleAttack(\'dodge\',\''+eatk+'\')">💨 Dodge+Strike<br><span style="font-size:.7em;color:#aad4ff">Risky high reward</span></div>'+
    '<div class="abtn2" onclick="battleAttack(\'weak\',\''+eatk+'\')">🎯 Hit Weak Spot<br><span style="font-size:.7em;color:#aad4ff">Aim for '+b.enemy.weak+'</span></div>'+
    '<div class="abtn2" onclick="battleAttack(\'shield\',\''+eatk+'\')">🛡️ Defend<br><span style="font-size:.7em;color:#aad4ff">Reduce damage</span></div>'+
    '</div>';
  document.getElementById('ptitle').textContent='⚔️ Battle: '+b.enemy.n+'!';
  document.getElementById('pbody').innerHTML=html;
  document.getElementById('pclosebtn').textContent='Flee ✕';
  document.getElementById('pclosebtn').onclick=function(){battleState=null;closePop();};
  document.getElementById('pop').classList.add('open');
}
function battleAttack(type,eatk){
  var b=battleState;
  var pDmg,eDmg,msg;
  if(type==='blast'){pDmg=Math.floor(18+Math.random()*14);eDmg=Math.floor(8+Math.random()*12);msg='🔥 '+drNick+' fires a huge blast for '+pDmg+' damage!';}
  else if(type==='dodge'){var hit=Math.random()>.35;pDmg=hit?Math.floor(28+Math.random()*20):0;eDmg=hit?2:Math.floor(15+Math.random()*10);msg=hit?'💨 Perfect dodge! Counter for '+pDmg+'!':'💨 Missed! Took '+eDmg+' damage!';}
  else if(type==='weak'){var crit=Math.random()>.4;pDmg=crit?Math.floor(30+Math.random()*20):Math.floor(10+Math.random()*8);eDmg=crit?0:Math.floor(8+Math.random()*8);msg=crit?'🎯 CRITICAL! Hit the '+b.enemy.weak+'! '+pDmg+' damage!':'🎯 Missed the weak spot. '+pDmg+' damage, took '+eDmg+'.';}
  else{pDmg=Math.floor(6+Math.random()*8);eDmg=Math.floor(3+Math.random()*5);msg='🛡️ Shielded! Only '+eDmg+' damage, dealt '+pDmg+'.';}
  b.enemy.hp=Math.max(0,b.enemy.hp-pDmg);b.playerHP=Math.max(0,b.playerHP-eDmg);b.turn++;
  if(b.enemy.hp<=0){
    battleState=null;var rew=Math.floor(8+Math.random()*8);coins=Math.min(200,coins+rew);updateCoins();changeStat('happy',15);
    document.getElementById('pclosebtn').textContent='Close ✕';document.getElementById('pclosebtn').onclick=closePop;
    showPop('🏆 VICTORY!','You defeated the '+b.enemy.n+'! '+drNick+' roars triumphantly!','<div class="ow">+'+rew+'🪙 +15 Happy!</div>');return;
  }
  if(b.playerHP<=0){battleState=null;document.getElementById('pclosebtn').textContent='Close ✕';document.getElementById('pclosebtn').onclick=closePop;showPop('💔 Defeated...','The '+b.enemy.n+' was too powerful. Train harder!','<div class="ol">Retreat...</div>');return;}
  document.getElementById('pbody').innerHTML='<div style="background:rgba(255,255,255,.06);border-radius:9px;padding:9px;color:#e0d0b0;font-size:.85em">'+msg+'<br><em style="color:#e74c3c">'+b.enemy.n+' used '+eatk+'!</em></div>';
  document.getElementById('ptitle').textContent='Round '+(b.turn+1)+'...';
  setTimeout(renderBattle,1100);
}

function openGameMenu(){showPop('🎮 Games','Play a game with '+drNick+'!',
  '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+

var tB,tT,tO;
function startTTT(){tB=Array(9).fill('');tT='X';tO=true;drawTTT();}
function drawTTT(){
  var c='';for(var i=0;i<9;i++) c+='<div style="height:58px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,215,0,.25);border-radius:9px;font-size:1.8em;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="tc('+i+')">'+(tB[i]==='X'?'🔥':tB[i]==='O'?dragonDef.name[0]:'')+'</div>';
  document.getElementById('pbody').innerHTML='<p style="color:#aad4ff;margin-bottom:5px">'+(tO?(tT==='X'?'Your turn 🔥':drNick+'\'s turn'):'Game Over!')+'</p><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-width:200px;margin:7px auto">'+c+'</div><button class="gbtn" style="margin-top:7px" onclick="startTTT()">New</button><button class="gbtn" onclick="openGameMenu()">Back</button>';
}
function tc(i){if(!tO||tB[i])return;tB[i]=tT;var w=cTTT();if(w){tO=false;drawTTT();addTR(w);return;}if(tB.indexOf('')===-1){tO=false;drawTTT();addTR('draw');return;}tT=tT==='X'?'O':'X';drawTTT();if(tT==='O') setTimeout(aiT,600);}
function aiT(){if(!tO)return;var e2=[];for(var i=0;i<9;i++){if(!tB[i])e2.push(i);}if(!e2.length)return;tB[e2[Math.floor(Math.random()*e2.length)]]='O';var w=cTTT();if(w){tO=false;drawTTT();addTR(w);return;}if(tB.indexOf('')===-1){tO=false;drawTTT();addTR('draw');return;}tT='X';drawTTT();}
function cTTT(){var L=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(var i=0;i<L.length;i++){var a2=L[i][0],b2=L[i][1],c2=L[i][2];if(tB[a2]&&tB[a2]===tB[b2]&&tB[a2]===tB[c2])return tB[a2];}return null;}
function addTR(w){var m=w==='draw'?'Draw!':w==='X'?'🎉 You win!':drNick+' wins!';document.getElementById('pbody').innerHTML+='<div style="color:'+(w==='X'?'#2ecc71':w==='draw'?'#ffd700':'#e74c3c')+';font-weight:700;margin-top:7px">'+m+'</div>';}

var cC2,cF2,cM2,cCF2;
var cSym=['🐉','⚡','🔥','❄️','💨','✨'];
function startCards(){var d2=cSym.concat(cSym).sort(function(){return Math.random()-.5;});cC2=d2.map(function(s,i){return{id:i,s:s,shown:false,matched:false};});cF2=[];cM2=0;cCF2=true;drawCards2();}
function drawCards2(){var h='<p style="color:#aad4ff;margin-bottom:5px">Match pairs! '+cM2+'/'+cSym.length+'</p><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:7px 0">';for(var i=0;i<cC2.length;i++){var c3=cC2[i];h+='<div style="width:52px;height:76px;border-radius:8px;border:1.5px solid #ffd700;background:'+(c3.shown||c3.matched?'linear-gradient(135deg,#2d5a1b,#1a3a0a)':'linear-gradient(135deg,#1a3a6e,#0d2137)')+';font-size:1.6em;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="fc2('+i+')">'+(c3.shown||c3.matched?c3.s:'🐲')+'</div>';}h+='</div><button class="gbtn" onclick="startCards()">New</button><button class="gbtn" onclick="openGameMenu()">Back</button>';document.getElementById('pbody').innerHTML=h;}
function fc2(i){if(!cCF2||cC2[i].shown||cC2[i].matched)return;cC2[i].shown=true;cF2.push(i);drawCards2();if(cF2.length===2){cCF2=false;setTimeout(function(){var a3=cF2[0],b3=cF2[1];if(cC2[a3].s===cC2[b3].s){cC2[a3].matched=cC2[b3].matched=true;cM2++;}cC2[a3].shown=cC2[b3].shown=false;cF2=[];cCF2=true;drawCards2();if(cM2===cSym.length)document.getElementById('pbody').innerHTML+='<div class="ow">🎉 All matched! '+drNick+' is so proud!</div>';},800);}}

var sS,sG,sO;
function startSoccer(){sS=0;sG=0;sO=true;drawSoc('');}
function drawSoc(msg){document.getElementById('pbody').innerHTML='<p style="color:#ffd700;margin-bottom:5px">⚽ Dragon Soccer! Score 3 to win!</p><p style="color:#aad4ff;font-size:.8em;margin-bottom:6px">Shots: '+sS+' | Goals: '+sG+'/3</p><div style="width:100px;height:58px;border:3.5px solid white;border-bottom:none;margin:0 auto 6px;border-radius:4px 4px 0 0;position:relative;background:rgba(255,255,255,.04)"><div id="gfb" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.7em"></div></div><div style="display:flex;gap:7px;justify-content:center;margin:7px 0"><button class="gbtn" onclick="sh(\'left\')">↖️ Left</button><button class="gbtn" onclick="sh(\'center\')">⬆️ Center</button><button class="gbtn" onclick="sh(\'right\')">↗️ Right</button></div>'+(msg?'<p style="margin-top:6px;font-weight:700;color:'+(msg.indexOf('GOAL')!==-1?'#2ecc71':'#e74c3c')+'">'+msg+'</p>':'')+'<button class="gbtn" onclick="startSoccer()">New</button><button class="gbtn" onclick="openGameMenu()">Back</button>';}
function sh(dir){if(!sO)return;sS++;var g2=['left','center','right'][Math.floor(Math.random()*3)];var sc=dir!==g2;if(sc)sG++;var fb=document.getElementById('gfb');if(fb)fb.textContent=sc?'⚽':'🧤';if(sG>=3){sO=false;document.getElementById('pbody').innerHTML='<div class="ow" style="font-size:1em;margin:9px 0">🏆 3 goals in '+sS+' shots!<br>'+drNick+' does a victory lap!</div><button class="gbtn" onclick="startSoccer()">Again</button><button class="gbtn" onclick="openGameMenu()">Back</button>';return;}drawSoc(sc?'GOAL! 🔥':'Saved! Try again!');}

function setMode(m){
  moveMode=m;
  document.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('am');});
  document.getElementById('m'+m[0]).classList.add('am');
  var badge=document.getElementById('mbadge');

  if(m!=='fly'){velY=0;}
  document.getElementById('hloc').textContent=inHiddenWorld?'✨ Hidden World':inHouse?'🏠 Inside':'🌍 Isle of Berk';
}
function dk(dir,on){keys[dir]=on;}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=1;
  if(e.key==='ArrowRight'||e.key==='d') keys.right=1;
  if(e.key==='ArrowUp'||e.key==='w') keys.up=1;
  if(e.key==='ArrowDown'||e.key==='s') keys.down=1;
  if(e.key==='1') setMode('walk');
  if(e.key==='2') setMode('run');
  if(e.key==='3') setMode('fly');
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=0;
  if(e.key==='ArrowRight'||e.key==='d') keys.right=0;
  if(e.key==='ArrowUp'||e.key==='w') keys.up=0;
  if(e.key==='ArrowDown'||e.key==='s') keys.down=0;
});

// Check hidden world exit
setInterval(function(){
  if(inHiddenWorld&&drX<80&&moveMode!=='fly'){
    inHiddenWorld=false;showFlash('← Back to Berk!');
  }
},500);
  function playSelectSound(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.type='triangle';
  o.frequency.value=520;
  g.gain.value=0.08;

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime+0.15);
}
