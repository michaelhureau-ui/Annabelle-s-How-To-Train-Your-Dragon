<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dragon World — Isle of Berk</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Crimson Text',serif;overflow:hidden}
canvas{display:block}

/* screens */
.screen{display:none;position:fixed;inset:0}
.screen.active{display:flex}

/* title screen */
#title{
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:20px;
background:radial-gradient(circle at bottom,#173a09,#050f02 60%,#000);
overflow-y:auto;
}

h1{font-family:Cinzel,serif;color:#ffd700;text-shadow:0 0 25px #ff6a00}
.subtitle{color:#aad4ff;margin-bottom:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;width:100%;max-width:650px}

.card{
background:rgba(255,255,255,.06);
border:2px solid rgba(255,255,255,.2);
border-radius:12px;
padding:8px;
text-align:center;
cursor:pointer;
transition:.2s;
}
.card:hover,.card.selected{
border-color:#ffd700;
background:rgba(255,215,0,.12);
transform:scale(1.05);
}

.card canvas{display:block;margin:auto}

.name{font-family:Cinzel;font-size:.75em;color:#ffd700}
.type{font-size:.65em;color:#aad4ff}

.box{
margin-top:20px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,215,0,.3);
border-radius:12px;
padding:15px;
width:100%;
max-width:450px;
}

.row{margin-bottom:10px}
label{font-size:.8em;color:#ffd700;font-family:Cinzel}
input{
width:100%;
padding:6px;
border-radius:6px;
border:none;
margin-top:4px
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#ffd700,#ff6a00);
font-family:Cinzel;
font-weight:bold;
cursor:pointer;
}

/* world */
#world{background:#000}

#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,.7);
padding:10px;
border-radius:10px;
border:1px solid rgba(255,215,0,.4);
}

.stat{font-size:.7em;margin:2px 0}

.controls{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
}

.ctrl{
background:rgba(0,0,0,.8);
border:1px solid #fff;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

.flash{
position:fixed;
top:45%;
left:50%;
transform:translateX(-50%);
color:#ffd700;
font-family:Cinzel;
font-size:1.2em;
animation:fade 1s forwards;
}

@keyframes fade{
to{opacity:0;top:30%}
}
</style>
</head>

<body>

<!-- TITLE SCREEN -->
<div id="title" class="screen active">
  <h1>🐉 Dragon World</h1>
  <div class="subtitle">Choose your dragon</div>

  <div class="grid" id="dragonGrid"></div>

  <div class="box">
    <div class="row">
      <label>Your Name</label>
      <input id="playerName" placeholder="Viking name">
    </div>
    <div class="row">
      <label>Dragon Name</label>
      <input id="dragonName" placeholder="Dragon nickname">
    </div>
  </div>

  <button onclick="startGame()">Enter Berk</button>
</div>

<!-- WORLD -->
<div id="world" class="screen">
  <canvas id="game"></canvas>
</div>

<div id="hud">
  <div class="stat">🍖 Food: <span id="food">70</span></div>
  <div class="stat">💧 Water: <span id="water">70</span></div>
  <div class="stat">😄 Happy: <span id="happy">70</span></div>
  <div class="stat">🪙 Coins: <span id="coins">0</span></div>
</div>

<div class="controls">
  <div class="ctrl" onclick="move(-1)">◀</div>
  <div class="ctrl" onclick="move(1)">▶</div>
  <div class="ctrl" onclick="feed()">🐟</div>
  <div class="ctrl" onclick="drink()">💧</div>
</div>

<script>
// ---------------- DRAGONS ----------------
const DRAGONS=[
  {name:'Toothless',type:'Night Fury',color:'#111'},
  {name:'Stormfly',type:'Deadly Nadder',color:'#2a6bc8'},
  {name:'Hookfang',type:'Monstrous Nightmare',color:'#cc2200'},
  {name:'Meatlug',type:'Gronckle',color:'#7a6a5a'},
  {name:'Light Fury',type:'Light Fury',color:'#e8f0ff'}
];

let selectedDragon=0;

function buildGrid(){
  const grid=document.getElementById('dragonGrid');
  DRAGONS.forEach((d,i)=>{
    const card=document.createElement('div');
    card.className='card'+(i===0?' selected':'');
    card.onclick=()=>{
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      selectedDragon=i;
    };

    const canvas=document.createElement('canvas');
    canvas.width=80; canvas.height=60;
    const c=canvas.getContext('2d');
    c.fillStyle=d.color;
    c.beginPath();
    c.ellipse(40,30,30,18,0,0,Math.PI*2);
    c.fill();

    card.appendChild(canvas);
    card.innerHTML+=`<div class="name">${d.name}</div><div class="type">${d.type}</div>`;
    grid.appendChild(card);
  });
}

buildGrid();

// --------------- GAME STATE ---------------
let food=70,water=70,happy=70,coins=0;
let playerX=200;

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

function startGame(){
  document.getElementById('title').classList.remove('active');
  document.getElementById('world').classList.add('active');
  resize();
  requestAnimationFrame(loop);
}

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.onresize=resize;

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function update(){
  food=Math.max(0,food-0.005);
  water=Math.max(0,water-0.005);
  document.getElementById('food').textContent=Math.floor(food);
  document.getElementById('water').textContent=Math.floor(water);
  document.getElementById('happy').textContent=Math.floor(happy);
  document.getElementById('coins').textContent=coins;
}

function draw(){
  ctx.fillStyle='#87CEEB';
  ctx.fillRect(0,0,canvas.width,canvas.height*0.6);

  ctx.fillStyle='#2f7a2f';
  ctx.fillRect(0,canvas.height*0.6,canvas.width,canvas.height*0.4);

  ctx.fillStyle=DRAGONS[selectedDragon].color;
  ctx.beginPath();
  ctx.ellipse(playerX,canvas.height*0.6-20,40,20,0,0,Math.PI*2);
  ctx.fill();
}

function move(dir){
  playerX+=dir*20;
}

function feed(){
  if(coins>0){
    coins--;
    food=Math.min(100,food+20);
    happy+=3;
    flash("🐟 Yum!");
  } else flash("Need coins!");
}

function drink(){
  water=Math.min(100,water+20);
  flash("💧 Refreshing!");
}

function flash(txt){
  const f=document.createElement('div');
  f.className='flash';
  f.textContent=txt;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}
</script>

</body>
</html>
